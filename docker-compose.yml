services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    networks:
      - dromind-network
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    networks:
      - dromind-network
    restart: unless-stopped
    depends_on:
      - backend

  mock-drone:
    build:
      context: ./backend # Reuses the backend environment containing OpenCV and Python dependencies
      dockerfile: Dockerfile
    volumes:
      - ./mock_drone.py:/app/mock_drone.py
      - ./drone.mp4:/app/drone.mp4
    entrypoint: ["python", "/app/mock_drone.py", "--host", "backend", "--port", "8000","--video", "/app/drone.mp4"]
    networks:
      - dromind-network
    depends_on:
      - backend
    restart: on-failure

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - dromind-network
    restart: unless-stopped

  ollama-pull-model:
    image: curlimages/curl:latest
    entrypoint: ["sh", "-c", "until curl -s http://ollama:11434/api/tags | grep -q \"$${OLLAMA_MODEL:-llama3.2}\"; do echo 'Pulling model $${OLLAMA_MODEL:-llama3.2}...'; curl -s -X POST http://ollama:11434/api/pull -d \"{\\\"name\\\": \\\"$${OLLAMA_MODEL:-llama3.2}\\\"}\"; sleep 5; done; echo 'Model pulled successfully!'"]
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      - ollama
    networks:
      - dromind-network
    restart: on-failure

volumes:
  ollama-data:

networks:
  dromind-network:
    driver: bridge
